name: Safeship scan

# Stamp the scan id into the run name so the app can find (and cancel) this run.
run-name: safeship-scan ${{ github.event.client_payload.scan_id || inputs.scan_id }}

# Runs the real engines on a GitHub-hosted runner and returns REDACTED findings.
# Two ways in:
#   • workflow_dispatch    — manual (UI / `gh workflow run`); uploads an artifact.
#   • repository_dispatch  — triggered by the app (POST /api/scan); POSTs findings
#                            back to the app's /api/scan/callback.
#
# NOTE: repository_dispatch always runs the workflow + code from the DEFAULT
# branch, so the scanner code must be on `main` for the app-triggered path.

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "HTTPS URL of the repository to scan (public repo for now)"
        required: true
        type: string
      scan_id:
        description: "Safeship scan id (optional; used by the callback)"
        required: false
        type: string
  repository_dispatch:
    types: [safeship-scan]

permissions:
  contents: read

env:
  # Pinned engine versions (verified asset names). Bump deliberately.
  GITLEAKS_VERSION: "8.30.1"
  OSV_SCANNER_VERSION: "2.4.0"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve inputs (workflow_dispatch OR repository_dispatch)
        id: vars
        env:
          WD_REPO: ${{ inputs.repo_url }}
          WD_SCAN: ${{ inputs.scan_id }}
          RD_REPO: ${{ github.event.client_payload.repo_url }}
          RD_SCAN: ${{ github.event.client_payload.scan_id }}
          RD_CALLBACK: ${{ github.event.client_payload.callback_url }}
          RD_PROGRESS: ${{ github.event.client_payload.progress_url }}
        run: |
          {
            echo "repo_url=${WD_REPO:-$RD_REPO}"
            echo "scan_id=${WD_SCAN:-$RD_SCAN}"
            echo "callback_url=${RD_CALLBACK}"
            echo "progress_url=${RD_PROGRESS}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Safeship (the scanner code)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Progress pings are cosmetic — "|| true" so they can never fail a scan.
      - name: Report progress — preparing
        if: steps.vars.outputs.progress_url != ''
        env:
          PROGRESS_URL: ${{ steps.vars.outputs.progress_url }}
          SCAN_ID: ${{ steps.vars.outputs.scan_id }}
          CALLBACK_SECRET: ${{ secrets.SCAN_CALLBACK_SECRET }}
        run: |
          curl -sS -X POST "$PROGRESS_URL" \
            -H "content-type: application/json" \
            -H "x-safeship-secret: $CALLBACK_SECRET" \
            --data "$(jq -nc --arg sid "$SCAN_ID" '{scanId:$sid, step:"preparing"}')" || true

      - name: Install dependencies
        run: npm ci

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Install osv-scanner
        run: |
          curl -sSL "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Install semgrep
        run: |
          pipx install semgrep
          semgrep --version

      - name: Report progress — scanning
        if: steps.vars.outputs.progress_url != ''
        env:
          PROGRESS_URL: ${{ steps.vars.outputs.progress_url }}
          SCAN_ID: ${{ steps.vars.outputs.scan_id }}
          CALLBACK_SECRET: ${{ secrets.SCAN_CALLBACK_SECRET }}
        run: |
          curl -sS -X POST "$PROGRESS_URL" \
            -H "content-type: application/json" \
            -H "x-safeship-secret: $CALLBACK_SECRET" \
            --data "$(jq -nc --arg sid "$SCAN_ID" '{scanId:$sid, step:"scanning"}')" || true

      - name: Run scan
        env:
          REPO_URL: ${{ steps.vars.outputs.repo_url }}
        run: |
          node --import tsx scanner/run.ts --repo "$REPO_URL" > findings.json
          echo "findings.json: $(wc -c < findings.json) bytes"

      - name: Report progress — reporting
        if: steps.vars.outputs.progress_url != ''
        env:
          PROGRESS_URL: ${{ steps.vars.outputs.progress_url }}
          SCAN_ID: ${{ steps.vars.outputs.scan_id }}
          CALLBACK_SECRET: ${{ secrets.SCAN_CALLBACK_SECRET }}
        run: |
          curl -sS -X POST "$PROGRESS_URL" \
            -H "content-type: application/json" \
            -H "x-safeship-secret: $CALLBACK_SECRET" \
            --data "$(jq -nc --arg sid "$SCAN_ID" '{scanId:$sid, step:"reporting"}')" || true

      - name: Send results to callback (app-triggered runs)
        if: steps.vars.outputs.callback_url != ''
        env:
          CALLBACK_URL: ${{ steps.vars.outputs.callback_url }}
          SCAN_ID: ${{ steps.vars.outputs.scan_id }}
          CALLBACK_SECRET: ${{ secrets.SCAN_CALLBACK_SECRET }}
        run: |
          jq -c --arg sid "$SCAN_ID" '{scanId: $sid, findings: .findings}' findings.json > payload.json
          echo "posting $(wc -c < payload.json) bytes to callback"
          code=$(curl -sS -o resp.txt -w "%{http_code}" -X POST "$CALLBACK_URL" \
            -H "content-type: application/json" \
            -H "x-safeship-secret: $CALLBACK_SECRET" \
            --data @payload.json)
          echo "callback HTTP $code"; cat resp.txt || true
          test "$code" = "200"

      - name: Summarize
        if: always()
        env:
          REPO_URL: ${{ steps.vars.outputs.repo_url }}
          SCAN_ID: ${{ steps.vars.outputs.scan_id }}
        run: |
          {
            echo "### Safeship scan — \`$REPO_URL\`"
            echo ""
            if [ -f findings.json ]; then
              COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('findings.json','utf8')).findings.length)")
              ENGINES=$(node -e "const e=JSON.parse(require('fs').readFileSync('findings.json','utf8')).engines; console.log(e.map(x=>x.engine+': '+(x.available?'ok':'missing')).join(', '))")
              echo "- Findings: **$COUNT**"
              echo "- Engines: $ENGINES"
            else
              echo "- ⚠️ No findings.json produced (scan step failed)."
            fi
            echo "- Scan id: \`${SCAN_ID:-n/a}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safeship-findings
          path: findings.json
          if-no-files-found: warn
